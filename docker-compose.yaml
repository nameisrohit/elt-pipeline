version: '3.8'
x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/credentials.json
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./extract:/opt/airflow/extract
    - ./load:/opt/airflow/load
    - ./credentials.json:/opt/airflow/credentials.json

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    depends_on: [postgres]

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver --port 8080
    ports: ["8080:8080"]
    depends_on: [airflow-init]

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    depends_on: [airflow-init]